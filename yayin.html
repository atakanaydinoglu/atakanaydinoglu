<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Atakan Aydınoğlu kişisel yayın arşivinde seçili metin sayfası."
    />
    <meta name="theme-color" content="#102f35" />
    <title>Yayın | Atakan Aydınoğlu</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="publication-page">
    <a class="skip-link" href="#publicationBody">Metne geç</a>

    <header class="site-header" aria-label="Üst menü">
      <a class="brand" href="index.html" aria-label="Ana sayfa">
        <span class="brand-mark" aria-hidden="true">AA</span>
        <span>
          <strong>Atakan Aydınoğlu</strong>
          <small>kişisel yayın arşivi</small>
        </span>
      </a>

      <nav class="main-nav" aria-label="Site bölümleri">
        <a href="index.html#turler">Türler</a>
        <a href="index.html#arsiv">Arşiv</a>
        <a href="index.html#ceviri">Çeviri</a>
        <a href="index.html#iletisim">İletişim</a>
      </nav>
    </header>

    <main>
      <section class="publication-hero" id="publicationHero">
        <div class="publication-hero-inner">
          <a class="back-link" href="index.html#arsiv">Arşive dön</a>
          <p class="eyebrow" id="publicationKicker">Yayın</p>
          <h1 id="publicationTitle"></h1>
          <p class="publication-summary" id="publicationSummary"></p>
          <div class="tag-list publication-tags" id="publicationTags"></div>
        </div>
        <aside class="publication-facts" id="publicationFacts" aria-label="Yayın bilgileri"></aside>
      </section>

      <section class="publication-body" id="publicationBody"></section>

      <section class="related-section" id="relatedSection" aria-labelledby="relatedTitle" hidden>
        <div class="section-heading">
          <p class="eyebrow">Aynı odadan</p>
          <h2 id="relatedTitle">Benzer yayınlar</h2>
        </div>
        <div class="related-grid" id="relatedGrid"></div>
      </section>
    </main>

    <script src="content.js"></script>
    <script src="publication.js"></script>
  </body>
</html>
